name: Oppdater arrangementer

on:
  schedule:
    # Én gang i døgnet (06:00 UTC) — arrangementer endrer seg sjelden
    - cron: '0 6 * * *'
  workflow_dispatch:  # Kan også kjøres manuelt fra GitHub UI

permissions:
  contents: write  # Nødvendig for å committe src/data/arrangementer.json
  actions: write   # Nødvendig for å utløse deploy-workflowen etter push

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Sett opp Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Hent kurs og konferanser (Nordland)
        run: node scripts/update-arrangementer.mjs

      - name: Commit og push (kun hvis endret)
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/arrangementer.json
          if git diff --staged --quiet; then
            echo "Ingen endring — hopper over commit/push/deploy."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: oppdater arrangementer [$(date -u +'%Y-%m-%d %H:%M UTC')]"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      # Push med GITHUB_TOKEN utløser IKKE andre workflows (GitHubs løkkevern),
      # så deploy.yml må startes eksplisitt — ellers når ikke nye data den
      # publiserte siden før neste menneskelige push.
      - name: Utløs deploy av siden
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main
