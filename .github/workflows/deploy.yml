name: Bygg og deploy til GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v4

      - name: Sett opp Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Installer avhengigheter
        run: npm ci

      - name: Bygg statisk side
        run: npm run build
        env:
          # SITE = kun origin (uten understi). Bytt når eget domene er kjøpt:
          #   SITE: https://hytteutleie-ffh143.no
          #   BASE: /
          SITE: https://t-event.github.io
          BASE: /fellesforbundet-helgeland-avd143
          PUBLIC_WEB3FORMS_KEY: ${{ secrets.WEB3FORMS_KEY }}

      - name: Last opp Pages-artefakt
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    steps:
      # Deploy-steget feiler av og til på forbigående Pages-glitcher (ikke koden,
      # jf. run #58). Forsøk 1 svelger en slik feil (continue-on-error); ved feil
      # venter vi litt og prøver én gang til. Jobben feiler bare hvis BEGGE feiler.
      - name: Deploy til GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Vent før nytt forsøk
        if: steps.deployment.outcome == 'failure'
        run: sleep 20

      - name: Deploy til GitHub Pages (forsøk 2)
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
