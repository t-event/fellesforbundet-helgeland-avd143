name: Oppdater ledige datoer

on:
  schedule:
    # Kjøres hvert hele time (UTC)
    - cron: '0 * * * *'
  workflow_dispatch:  # Kan også kjøres manuelt fra GitHub UI

permissions:
  contents: write  # Nødvendig for å committe availability.json
  actions: write   # Nødvendig for å utløse deploy-workflowen etter push

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Sett opp Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Hent kalender og oppdater availability.json
        env:
          CALENDAR_ICS_URL: ${{ secrets.CALENDAR_ICS_URL }}
        run: node scripts/update-availability.js

      - name: Commit og push (kun hvis endret)
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/availability.json
          if git diff --staged --quiet; then
            echo "Ingen endring — hopper over commit/push/deploy."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: oppdater availability.json [$(date -u +'%Y-%m-%d %H:%M UTC')]"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      # Push med GITHUB_TOKEN utløser IKKE andre workflows (GitHubs løkkevern),
      # så deploy.yml må startes eksplisitt — ellers når ikke nye data den
      # publiserte siden før neste menneskelige push.
      - name: Utløs deploy av siden
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main
